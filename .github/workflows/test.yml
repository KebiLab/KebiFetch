name: Test KebiFetch

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run kebifetch
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./kebifetch.ps1 -NoColor

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7
        run: |
          set +e
          brew install --cask powershell@preview 2>/dev/null
          if ! command -v pwsh >/dev/null 2>&1; then
            brew install --cask powershell 2>/dev/null
          fi
          set -e
          if ! command -v pwsh >/dev/null 2>&1; then
            echo "::error::pwsh not found after install"
            exit 1
          fi

      - name: Run kebifetch
        run: |
          pwsh -NoProfile -File ./kebifetch.ps1 -NoColor
